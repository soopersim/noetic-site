<svg viewBox="0 0 240 320" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <pattern id="ec-hatch" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(42)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#1A1714" stroke-width="0.3" opacity="0.16"/>
    </pattern>
  </defs>

  <!-- Border -->
  <rect x="6" y="6" width="228" height="308" stroke="#1A1714" stroke-width="0.7" fill="none"/>
  <rect x="10" y="10" width="220" height="300" stroke="#1A1714" stroke-width="0.25" fill="none"/>

  <!-- Background -->
  <rect x="11" y="11" width="218" height="298" fill="url(#ec-hatch)"/>

  <!-- Column base -->
  <rect x="70" y="260" width="100" height="16" fill="#F5F1EA" stroke="#1A1714" stroke-width="0.7"/>
  <rect x="80" y="256" width="80" height="6" fill="#F5F1EA" stroke="#1A1714" stroke-width="0.5"/>

  <!-- Column shaft -->
  <rect x="92" y="80" width="56" height="178" fill="#F5F1EA" stroke="#1A1714" stroke-width="0.8"/>
  <!-- Flutes -->
  <line x1="99" y1="82" x2="99" y2="256" stroke="#1A1714" stroke-width="0.3" opacity="0.5"/>
  <line x1="106" y1="82" x2="106" y2="256" stroke="#1A1714" stroke-width="0.3" opacity="0.5"/>
  <line x1="113" y1="82" x2="113" y2="256" stroke="#1A1714" stroke-width="0.3" opacity="0.5"/>
  <line x1="120" y1="82" x2="120" y2="256" stroke="#1A1714" stroke-width="0.3" opacity="0.5"/>
  <line x1="127" y1="82" x2="127" y2="256" stroke="#1A1714" stroke-width="0.3" opacity="0.5"/>
  <line x1="134" y1="82" x2="134" y2="256" stroke="#1A1714" stroke-width="0.3" opacity="0.5"/>
  <line x1="141" y1="82" x2="141" y2="256" stroke="#1A1714" stroke-width="0.3" opacity="0.5"/>

  <!-- Capital (Ionic scroll suggestion) -->
  <rect x="78" y="68" width="84" height="14" fill="#F5F1EA" stroke="#1A1714" stroke-width="0.6"/>
  <!-- Volute left -->
  <path d="M 78,75 Q 72,70 70,65 Q 70,58 76,56 Q 82,54 84,60 Q 82,64 78,63 Q 76,62 77,65 Q 78,68 82,68" stroke="#1A1714" stroke-width="0.5" fill="none"/>
  <!-- Volute right -->
  <path d="M 162,75 Q 168,70 170,65 Q 170,58 164,56 Q 158,54 156,60 Q 158,64 162,63 Q 164,62 163,65 Q 162,68 158,68" stroke="#1A1714" stroke-width="0.5" fill="none"/>
  <!-- Echinus/ovolo moulding -->
  <path d="M 80,68 Q 120,62 160,68" stroke="#1A1714" stroke-width="0.4" fill="none"/>

  <!-- Entablature (beam above) -->
  <rect x="60" y="52" width="120" height="18" fill="#F5F1EA" stroke="#1A1714" stroke-width="0.6"/>
  <rect x="63" y="55" width="114" height="12" fill="none" stroke="#1A1714" stroke-width="0.3"/>
  <!-- Frieze decoration -->
  <line x1="70" y1="60" x2="170" y2="60" stroke="#1A1714" stroke-width="0.3" opacity="0.5"/>
  <circle cx="85" cy="60" r="2" fill="none" stroke="#1A1714" stroke-width="0.3"/>
  <circle cx="105" cy="60" r="2" fill="none" stroke="#1A1714" stroke-width="0.3"/>
  <circle cx="120" cy="60" r="2" fill="none" stroke="#1A1714" stroke-width="0.3"/>
  <circle cx="135" cy="60" r="2" fill="none" stroke="#1A1714" stroke-width="0.3"/>
  <circle cx="155" cy="60" r="2" fill="none" stroke="#1A1714" stroke-width="0.3"/>

  <!-- Pediment triangle -->
  <path d="M 50,52 L 120,22 L 190,52" stroke="#1A1714" stroke-width="0.7" fill="#F5F1EA"/>
  <!-- Pediment inner -->
  <path d="M 58,52 L 120,30 L 182,52" stroke="#1A1714" stroke-width="0.3" fill="none"/>
  <!-- Acroteria -->
  <path d="M 50,52 Q 46,46 48,40 Q 52,36 56,40 Q 58,46 54,52" stroke="#1A1714" stroke-width="0.4" fill="none"/>
  <path d="M 190,52 Q 194,46 192,40 Q 188,36 184,40 Q 182,46 186,52" stroke="#1A1714" stroke-width="0.4" fill="none"/>
  <circle cx="120" cy="20" r="5" fill="#F5F1EA" stroke="#1A1714" stroke-width="0.5"/>
  <path d="M 115,20 Q 120,14 125,20" stroke="#1A1714" stroke-width="0.4" fill="none"/>

  <!-- Small figure at column base (philosopher) -->
  <ellipse cx="68" cy="240" rx="9" ry="11" fill="#F5F1EA" stroke="#1A1714" stroke-width="0.6"/>
  <!-- Hair -->
  <path d="M 59,238 Q 62,230 68,228 Q 74,230 77,238" stroke="#1A1714" stroke-width="0.45" fill="none"/>
  <line x1="62" y1="233" x2="63" y2="229" stroke="#1A1714" stroke-width="0.3"/>
  <line x1="66" y1="230" x2="67" y2="226" stroke="#1A1714" stroke-width="0.3"/>
  <line x1="70" y1="230" x2="71" y2="226" stroke="#1A1714" stroke-width="0.3"/>
  <line x1="74" y1="233" x2="75" y2="229" stroke="#1A1714" stroke-width="0.3"/>
  <!-- Eye -->
  <ellipse cx="74" cy="241" rx="2" ry="1.5" fill="none" stroke="#1A1714" stroke-width="0.4"/>
  <!-- Body -->
  <path d="M 60,250 L 62,258 Q 68,262 74,258 L 76,250 Q 68,248 60,250 Z" fill="#F5F1EA" stroke="#1A1714" stroke-width="0.6"/>
  <!-- Seated posture -->
  <path d="M 62,258 L 55,268 L 60,270" stroke="#1A1714" stroke-width="0.5" fill="none"/>
  <path d="M 74,258 L 78,270" stroke="#1A1714" stroke-width="0.5" fill="none"/>
  <!-- Drapery -->
  <path d="M 62,252 Q 58,258 56,268" stroke="#1A1714" stroke-width="0.35" fill="none"/>
  <!-- Arm with scroll -->
  <path d="M 74,252 Q 82,248 88,250" stroke="#1A1714" stroke-width="0.5" fill="none"/>
  <!-- Tiny scroll -->
  <rect x="86" y="244" width="12" height="10" rx="1" fill="#F5F1EA" stroke="#1A1714" stroke-width="0.45"/>
  <line x1="88" y1="248" x2="96" y2="248" stroke="#1A1714" stroke-width="0.3"/>
  <line x1="88" y1="251" x2="96" y2="251" stroke="#1A1714" stroke-width="0.3"/>

  <!-- Ground shadow lines under column -->
  <path d="M 65,277 Q 120,280 175,277" stroke="#1A1714" stroke-width="0.4" fill="none" opacity="0.4"/>
  <path d="M 72,281 Q 120,284 168,281" stroke="#1A1714" stroke-width="0.25" fill="none" opacity="0.3"/>

  <!-- Corner ornaments -->
  <path d="M 14,14 Q 20,14 20,20" stroke="#1A1714" stroke-width="0.4" fill="none"/>
  <path d="M 226,14 Q 220,14 220,20" stroke="#1A1714" stroke-width="0.4" fill="none"/>
  <path d="M 14,306 Q 20,306 20,300" stroke="#1A1714" stroke-width="0.4" fill="none"/>
  <path d="M 226,306 Q 220,306 220,300" stroke="#1A1714" stroke-width="0.4" fill="none"/>
</svg>
